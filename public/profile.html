<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — WAF Test Range</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <h1>WAF Test Range</h1>
    <nav>
      <a href="/index.html">Home</a>
      <a href="/about.html">About</a>
      <a href="/search.html">Search</a>
      <a href="/login.html">Login</a>
      <a href="/upload.html">Upload</a>
      <a href="/profile.html">Profile</a>
      <a href="/comments.html">Comments</a>
    </nav>
  </header>
  <main>
    <div class="card">
      <h2>User Profile Lookup</h2>
      <form id="profileForm">
        <label for="userId">User ID</label>
        <input type="number" id="userId" name="userId" min="1" value="1" required>
        <button type="submit">Lookup</button>
      </form>
      <pre id="result" class="result" style="display:none;"></pre>
    </div>
  </main>
  <footer>&copy; <span id="year"></span> WAF Test Range</footer>
  <script src="/js/main.js"></script>
  <script>
    document.getElementById("profileForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const id = document.getElementById("userId").value;
      const data = await getJson(`/api/users/${id}`);
      const out = document.getElementById("result");
      out.style.display = "block";
      out.textContent = JSON.stringify(data, null, 2);
    });
  </script>
</body>
</html>
