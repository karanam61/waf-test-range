<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comments — WAF Test Range</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <h1>WAF Test Range</h1>
    <nav>
      <a href="/index.html">Home</a>
      <a href="/about.html">About</a>
      <a href="/search.html">Search</a>
      <a href="/login.html">Login</a>
      <a href="/upload.html">Upload</a>
      <a href="/profile.html">Profile</a>
      <a href="/comments.html">Comments</a>
    </nav>
  </header>
  <main>
    <div class="card">
      <h2>Comments Board</h2>
      <form id="commentForm">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" required>
        <label for="comment">Comment</label>
        <textarea id="comment" name="comment" rows="4" required></textarea>
        <button type="submit">Post Comment</button>
      </form>
    </div>
    <div class="card">
      <h3>All Comments</h3>
      <div id="commentsList"></div>
    </div>
  </main>
  <footer>&copy; <span id="year"></span> WAF Test Range</footer>
  <script src="/js/main.js"></script>
  <script>
    async function loadComments() {
      const comments = await getJson("/api/comments");
      const list = document.getElementById("commentsList");
      list.innerHTML = "";
      comments.forEach((c) => {
        const div = document.createElement("div");
        div.className = "comment";
        div.innerHTML = `<strong>${c.name}</strong><br>${c.comment}`;
        list.appendChild(div);
      });
    }

    document.getElementById("commentForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const name = document.getElementById("name").value;
      const comment = document.getElementById("comment").value;
      await postJson("/api/comments", { name, comment });
      document.getElementById("commentForm").reset();
      loadComments();
    });

    loadComments();
  </script>
</body>
</html>
