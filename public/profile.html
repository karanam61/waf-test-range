<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account — Atlas & Co.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/index.html">Atlas & Co.<span>Outdoor outfitters</span></a>
    <nav class="site-nav">
      <a data-nav href="/index.html">Home</a>
      <a data-nav href="/search.html">Shop</a>
      <a data-nav href="/about.html">About</a>
      <a data-nav href="/comments.html">Reviews</a>
      <a data-nav href="/upload.html">Returns</a>
      <a data-nav href="/profile.html">Account</a>
      <a class="nav-cta" data-nav href="/login.html">Sign in</a>
    </nav>
  </header>

  <main class="page-shell">
    <p class="eyebrow">Member desk</p>
    <h1 class="page-title">Account lookup</h1>
    <p class="page-lead">Look up a member profile by ID for order help and returns.</p>

    <div class="panel">
      <form id="profileForm" class="form-grid">
        <div>
          <label for="userId">Member ID</label>
          <input type="number" id="userId" name="userId" min="1" value="1" required>
        </div>
        <button class="btn" type="submit">Look up account</button>
      </form>
      <pre id="result" class="result" style="display:none;"></pre>
      <div class="lab-note">WAF endpoint unchanged: <code>GET /api/users/:id</code></div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-meta">&copy; <span id="year"></span> Atlas & Co.</div>
  </footer>

  <script src="/js/main.js"></script>
  <script>
    document.getElementById("profileForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const id = document.getElementById("userId").value;
      const data = await getJson(`/api/users/${id}`);
      const out = document.getElementById("result");
      out.style.display = "block";
      out.textContent = JSON.stringify(data, null, 2);
    });
  </script>
</body>
</html>
