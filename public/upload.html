<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Returns — Atlas & Co.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/index.html">Atlas & Co.<span>Outdoor outfitters</span></a>
    <nav class="site-nav">
      <a data-nav href="/index.html">Home</a>
      <a data-nav href="/search.html">Shop</a>
      <a data-nav href="/about.html">About</a>
      <a data-nav href="/comments.html">Reviews</a>
      <a data-nav href="/upload.html">Returns</a>
      <a data-nav href="/profile.html">Account</a>
      <a class="nav-cta" data-nav href="/login.html">Sign in</a>
    </nav>
  </header>

  <main class="page-shell">
    <p class="eyebrow">Returns desk</p>
    <h1 class="page-title">Upload return photos</h1>
    <p class="page-lead">Send a clear photo of the item and packing slip so we can process exchanges faster.</p>

    <div class="panel">
      <form id="uploadForm" class="form-grid" enctype="multipart/form-data">
        <div>
          <label for="file">Choose a photo or document</label>
          <input type="file" id="file" name="file" required>
        </div>
        <button class="btn" type="submit">Upload</button>
      </form>
      <pre id="result" class="result" style="display:none;"></pre>
      <div class="lab-note">WAF endpoint unchanged: <code>POST /api/upload</code></div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-meta">&copy; <span id="year"></span> Atlas & Co.</div>
  </footer>

  <script src="/js/main.js"></script>
  <script>
    document.getElementById("uploadForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const formData = new FormData();
      formData.append("file", document.getElementById("file").files[0]);
      const res = await fetch("/api/upload", { method: "POST", body: formData });
      const data = await res.json();
      const out = document.getElementById("result");
      out.style.display = "block";
      out.textContent = JSON.stringify(data, null, 2);
    });
  </script>
</body>
</html>
